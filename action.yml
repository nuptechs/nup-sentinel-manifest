# NuPtechs Sentinel — Impacto de Entrega por PR + Auto-Map (ADR-0019 Ondas 1–3)
#
# UM workflow, DOIS modos (auto-detectados pelo evento):
#   • pull_request → `impact-pr`: computa o diff, chama a instância Sentinel do
#     cliente e posta o laudo 2-faces ASSINADO como comentário (upsert). Com
#     `sarif: 'true'`, as quebras alcançadas também viram anotações inline via
#     GitHub code scanning.
#   • push (branch principal) → `index`: refresca o MAPA do projeto a partir do
#     checkout (auto-map incremental — o cache por hash torna o refresh barato).
#
# Uso (workflow do cliente):
#
#   name: Sentinel
#   on:
#     pull_request: {}
#     push: { branches: [main] }
#   permissions:
#     pull-requests: write
#     contents: read
#     security-events: write        # só se sarif: 'true'
#   jobs:
#     sentinel:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#           with: { fetch-depth: 0 }
#         - uses: nuptechs/nup-sentinel-manifest@main
#           with:
#             server: https://sentinel.SEU-CLIENTE.com
#             api-key: ${{ secrets.SENTINEL_API_KEY }}
#             project: '42'
#             fail-on-alert: 'true'   # opcional: reprova PR em quebra alcançada
#             sarif: 'true'           # opcional: anotações inline no PR
name: "NuPtechs Sentinel — Impacto de Entrega"
description: "Laudo de impacto 2-faces (técnico+funcional, assinado) por PR + auto-map no push. Diff-aware, CI-native."
branding: { icon: "git-pull-request", color: "purple" }
inputs:
  server:
    description: "URL da instância Sentinel do cliente"
    required: true
  api-key:
    description: "API key da instância (secret)"
    required: true
  project:
    description: "ID do projeto no Sentinel"
    required: true
  mode:
    description: "auto | impact-pr | index (auto: pull_request→impact-pr, push→index)"
    required: false
    default: "auto"
  fail-on-alert:
    description: "sai com erro se houver quebra de contrato alcançada"
    required: false
    default: "false"
  sarif:
    description: "gera SARIF e sobe pro code scanning (anotações inline no PR)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Sentinel
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SENTINEL_SERVER: ${{ inputs.server }}
        SENTINEL_KEY: ${{ inputs.api-key }}
        SENTINEL_PROJECT: ${{ inputs.project }}
        SENTINEL_MODE: ${{ inputs.mode }}
        SENTINEL_FAIL_ON_ALERT: ${{ inputs.fail-on-alert }}
        SENTINEL_SARIF: ${{ inputs.sarif }}
      run: |
        set -e
        ACTION_DIR="${{ github.action_path }}"
        cd "$ACTION_DIR/cli"
        if [ ! -f dist/index.js ]; then npm ci --silent && npm run build --silent; fi

        MODE="$SENTINEL_MODE"
        if [ "$MODE" = "auto" ]; then
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then MODE=impact-pr; else MODE=index; fi
        fi
        echo "modo: $MODE (evento: ${GITHUB_EVENT_NAME})"

        if [ "$MODE" = "index" ]; then
          node dist/index.js --server "$SENTINEL_SERVER" --key "$SENTINEL_KEY" \
            index --project "$SENTINEL_PROJECT" --dir "$GITHUB_WORKSPACE"
        else
          FLAGS=""
          [ "$SENTINEL_FAIL_ON_ALERT" = "true" ] && FLAGS="$FLAGS --fail-on-alert"
          [ "$SENTINEL_SARIF" = "true" ] && FLAGS="$FLAGS --sarif-out $GITHUB_WORKSPACE/sentinel-impact.sarif"
          cd "$GITHUB_WORKSPACE"
          node "$ACTION_DIR/cli/dist/index.js" --server "$SENTINEL_SERVER" --key "$SENTINEL_KEY" \
            impact-pr --project "$SENTINEL_PROJECT" $FLAGS
        fi
    - name: Upload SARIF (anotações inline)
      if: ${{ inputs.sarif == 'true' && github.event_name == 'pull_request' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: sentinel-impact.sarif
        category: nuptechs-sentinel
